openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: medicine
    description: Medicine scanning and analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /medicine/analyze:
    post:
      operationId: analyzeMedicine
      tags: [medicine]
      summary: Analyze medicine from image
      description: Analyzes a medicine image using AI and returns dosage, use, price, and general information. Also saves the scan to history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeMedicineRequest"
      responses:
        "200":
          description: Medicine analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicineAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /medicine/history:
    get:
      operationId: getMedicineHistory
      tags: [medicine]
      summary: Get scan history
      description: Returns all previously scanned medicines in reverse chronological order
      responses:
        "200":
          description: List of scan history items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeMedicineRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image of the medicine
      required:
        - imageBase64
    MedicineAnalysisResult:
      type: object
      properties:
        id:
          type: integer
          description: Saved scan record ID
        name:
          type: string
        dosage:
          type: string
        primaryUse:
          type: string
        approximatePrice:
          type: string
        generalInfo:
          type: string
        warnings:
          type: string
        identified:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dosage
        - primaryUse
        - approximatePrice
        - generalInfo
        - warnings
        - identified
        - createdAt
    ScanHistoryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dosage:
          type: string
        primaryUse:
          type: string
        approximatePrice:
          type: string
        generalInfo:
          type: string
        warnings:
          type: string
        identified:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dosage
        - primaryUse
        - approximatePrice
        - generalInfo
        - warnings
        - identified
        - createdAt
    ScanHistoryList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        total:
          type: integer
      required:
        - items
        - total
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
