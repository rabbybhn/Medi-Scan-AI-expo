openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: medicine
    description: Medicine scanning and analysis
  - name: storage
    description: Object storage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /medicine/analyze:
    post:
      operationId: analyzeMedicine
      tags: [medicine]
      summary: Analyze medicine from image
      description: Analyzes a medicine image using AI, uploads the image to object storage, and saves the scan to history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeMedicineRequest"
      responses:
        "200":
          description: Medicine analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicineAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /medicine/history:
    get:
      operationId: getMedicineHistory
      tags: [medicine]
      summary: Get scan history
      description: Returns all previously scanned medicines in reverse chronological order
      responses:
        "200":
          description: List of scan history items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve a stored object
      parameters:
        - in: path
          name: objectPath
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeMedicineRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image of the medicine
      required:
        - imageBase64
    MedicineAnalysisResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dosage:
          type: string
        primaryUse:
          type: string
        approximatePrice:
          type: string
        generalInfo:
          type: string
        warnings:
          type: string
        identified:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dosage
        - primaryUse
        - approximatePrice
        - generalInfo
        - warnings
        - identified
        - createdAt
    ScanHistoryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dosage:
          type: string
        primaryUse:
          type: string
        approximatePrice:
          type: string
        generalInfo:
          type: string
        warnings:
          type: string
        identified:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dosage
        - primaryUse
        - approximatePrice
        - generalInfo
        - warnings
        - identified
        - createdAt
    ScanHistoryList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        total:
          type: integer
      required:
        - items
        - total
    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType
    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
